name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_QUALITY: 'preview'
  COVERAGE_THRESHOLD: '60 80'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests with coverage
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --settings coverage.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName!~E2E" \
            --logger "trx;LogFileName=test-results.trx"

      - name: Merge coverage reports
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: './TestResults/**/coverage.cobertura.xml'
          targetdir: './TestResults/merged'
          reporttypes: 'Cobertura'
          assemblyfilters: '-BecauseImClever.Client'
          classfilters: '-*.Migrations.*;-Program;-Microsoft.AspNetCore.OpenApi.Generated;-System.Runtime.CompilerServices'
          verbosity: 'Warning'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 7

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: ./TestResults/merged/Cobertura.xml
          retention-days: 30

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Tests
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./TestResults/merged/Cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: ${{ env.COVERAGE_THRESHOLD }}
          fail_below_min: true

      - name: Add coverage to step summary
        if: always()
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
