<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Clippy - Friendly Paperclip Assistant -->
  <!-- Main paperclip body -->
  <g transform="translate(15,10)">
    <!-- Outer clip wire -->
    <path d="M20,0 
             Q45,0 45,20 
             L45,75 
             Q45,95 25,95 
             Q5,95 5,75 
             L5,30 
             Q5,15 20,15" 
          fill="none" stroke="#A8A8A8" stroke-width="6" stroke-linecap="round"/>
    <!-- Inner clip wire (creating the clip shape) -->
    <path d="M20,15 
             Q35,15 35,28 
             L35,65 
             Q35,78 22,78 
             Q12,78 12,65 
             L12,35" 
          fill="none" stroke="#C0C0C0" stroke-width="5" stroke-linecap="round"/>
    <!-- Shine highlight -->
    <path d="M20,2 Q42,2 43,18 L43,30" 
          fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Eyes -->
  <g transform="translate(25,35)">
    <!-- Left eye - white -->
    <ellipse cx="0" cy="0" rx="7" ry="8" fill="white" stroke="#888" stroke-width="1"/>
    <!-- Left pupil -->
    <circle cx="1" cy="1" r="3.5" fill="#333"/>
    <!-- Left eye shine -->
    <circle cx="-1" cy="-2" r="1.5" fill="white"/>
    <!-- Right eye - white -->
    <ellipse cx="18" cy="0" rx="7" ry="8" fill="white" stroke="#888" stroke-width="1"/>
    <!-- Right pupil -->
    <circle cx="19" cy="1" r="3.5" fill="#333"/>
    <!-- Right eye shine -->
    <circle cx="17" cy="-2" r="1.5" fill="white"/>
  </g>
  <!-- Eyebrows -->
  <path d="M16,24 Q21,20 28,24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40,24 Q45,20 52,24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Friendly smile -->
  <path d="M28,50 Q34,58 42,50" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
</svg>