<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Garden Key Icon - ornate key with leaf motif -->
  <!-- Key head (bow) with leaf shape -->
  <path d="M10,8 Q6,13 10,18 Q14,22 18,18 Q22,13 18,8 Q14,4 10,8" 
        fill="#228B22" stroke="#006400" stroke-width="1.5"/>
  <!-- Leaf vein -->
  <line x1="14" y1="8" x2="14" y2="18" stroke="#006400" stroke-width="0.8" opacity="0.6"/>
  <line x1="11" y1="11" x2="14" y2="13" stroke="#006400" stroke-width="0.6" opacity="0.5"/>
  <line x1="17" y1="11" x2="14" y2="13" stroke="#006400" stroke-width="0.6" opacity="0.5"/>
  <!-- Key hole in bow -->
  <circle cx="14" cy="13" r="2.5" fill="none" stroke="#006400" stroke-width="1"/>
  <!-- Key shaft -->
  <rect x="18" y="11.5" width="15" height="3" rx="0.5" fill="#2E8B57" stroke="#006400" stroke-width="1"/>
  <!-- Key teeth (vine-like) -->
  <path d="M29,14.5 Q31,18 30,20" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
  <path d="M32,14.5 Q34,17 33,19" fill="none" stroke="#2E8B57" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small leaf at tip -->
  <path d="M33,19 Q35,17 34,20 Q33,22 33,19" fill="#228B22"/>
  <!-- Shine -->
  <path d="M9,9 Q11,7 13,9" fill="none" stroke="#90EE90" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>