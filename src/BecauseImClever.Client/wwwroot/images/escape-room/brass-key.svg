  <circle cx="13" cy="13" r="4" fill="none" stroke="#B8860B" stroke-width="2"/>
  <!-- Key shaft -->
  <rect x="19" y="11" width="16" height="4" rx="1" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <!-- Key teeth -->
  <rect x="30" y="15" width="3" height="5" rx="0.5" fill="#DAA520" stroke="#B8860B" stroke-width="0.5"/>
  <rect x="34" y="15" width="2" height="7" rx="0.5" fill="#DAA520" stroke="#B8860B" stroke-width="0.5"/>
  <!-- Shine -->
