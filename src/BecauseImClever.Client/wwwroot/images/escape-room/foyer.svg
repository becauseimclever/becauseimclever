<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <!-- Floor -->
  <rect x="0" y="260" width="800" height="90" fill="#d4a574"/>
  <rect x="0" y="260" width="800" height="4" fill="#c49464"/>
  <!-- Floor tiles pattern -->
  <g opacity="0.3">
    <line x1="100" y1="260" x2="80" y2="350" stroke="#b8845a" stroke-width="2"/>
    <line x1="200" y1="260" x2="180" y2="350" stroke="#b8845a" stroke-width="2"/>
    <line x1="300" y1="260" x2="280" y2="350" stroke="#b8845a" stroke-width="2"/>
    <line x1="400" y1="260" x2="400" y2="350" stroke="#b8845a" stroke-width="2"/>
    <line x1="500" y1="260" x2="520" y2="350" stroke="#b8845a" stroke-width="2"/>
    <line x1="600" y1="260" x2="620" y2="350" stroke="#b8845a" stroke-width="2"/>
    <line x1="700" y1="260" x2="720" y2="350" stroke="#b8845a" stroke-width="2"/>
  </g>
  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="260" fill="#ffecd2"/>
  <!-- Wainscoting -->
  <rect x="0" y="180" width="800" height="80" fill="#f0d4b0"/>
  <rect x="0" y="178" width="800" height="4" fill="#d4a574"/>
  <rect x="0" y="256" width="800" height="4" fill="#d4a574"/>
  <!-- Vertical wainscot panels -->
  <g opacity="0.4">
    <rect x="30" y="185" width="90" height="68" rx="2" fill="none" stroke="#c49464" stroke-width="2"/>
    <rect x="140" y="185" width="90" height="68" rx="2" fill="none" stroke="#c49464" stroke-width="2"/>
    <rect x="280" y="185" width="90" height="68" rx="2" fill="none" stroke="#c49464" stroke-width="2"/>
    <rect x="430" y="185" width="90" height="68" rx="2" fill="none" stroke="#c49464" stroke-width="2"/>
    <rect x="570" y="185" width="90" height="68" rx="2" fill="none" stroke="#c49464" stroke-width="2"/>
    <rect x="680" y="185" width="90" height="68" rx="2" fill="none" stroke="#c49464" stroke-width="2"/>
  </g>
  <!-- Picture Frame 1 (left) -->
  <rect x="60" y="40" width="120" height="100" rx="3" fill="#8B6914" stroke="#6B4914" stroke-width="4"/>
  <rect x="70" y="50" width="100" height="80" fill="#87CEEB"/>
  <!-- Landscape painting -->
  <rect x="70" y="95" width="100" height="35" fill="#228B22"/>
  <circle cx="140" cy="70" r="12" fill="#FFD700"/>
  <polygon points="90,95 105,70 120,95" fill="#006400"/>
  <polygon points="110,95 130,65 150,95" fill="#005000"/>
  <!-- Picture Frame 2 (center-left) -->
  <rect x="250" y="55" width="80" height="95" rx="3" fill="#8B6914" stroke="#6B4914" stroke-width="4"/>
  <rect x="258" y="63" width="64" height="79" fill="#ffe4e1"/>
  <!-- Portrait -->
  <circle cx="290" cy="90" r="16" fill="#fdbcb4"/>
  <ellipse cx="290" cy="78" rx="12" ry="10" fill="#654321"/>
  <circle cx="285" cy="92" r="2" fill="#333"/>
  <circle cx="295" cy="92" r="2" fill="#333"/>
  <path d="M285,100 Q290,105 295,100" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="278" y="106" width="24" height="30" rx="2" fill="#4169E1"/>
  <!-- Picture Frame 3 (right) -->
  <rect x="600" y="35" width="140" height="110" rx="3" fill="#8B6914" stroke="#6B4914" stroke-width="4"/>
  <rect x="610" y="45" width="120" height="90" fill="#FAEBD7"/>
  <!-- Still life painting -->
  <ellipse cx="650" cy="110" rx="30" ry="8" fill="#8B4513"/>
  <circle cx="640" cy="95" r="12" fill="#FF6347"/>
  <circle cx="660" cy="90" r="10" fill="#FFD700"/>
  <circle cx="650" cy="98" r="8" fill="#9ACD32"/>
  <!-- Entry table (center) -->
  <rect x="340" y="220" width="120" height="8" rx="2" fill="#8B4513" stroke="#6B3410" stroke-width="2"/>
  <rect x="350" y="228" width="8" height="32" fill="#8B4513"/>
  <rect x="442" y="228" width="8" height="32" fill="#8B4513"/>
  <!-- Vase on table -->
  <ellipse cx="400" cy="220" rx="12" ry="5" fill="#4169E1"/>
  <path d="M388,220 Q388,195 400,190 Q412,195 412,220" fill="#4169E1"/>
  <circle cx="395" cy="195" r="5" fill="#FF69B4"/>
  <circle cx="405" cy="192" r="4" fill="#FF1493"/>
  <circle cx="400" cy="198" r="3" fill="#FFB6C1"/>
  <!-- Dusty mirror (right of center) -->
  <ellipse cx="530" cy="110" rx="45" ry="55" fill="#CD853F" stroke="#8B6914" stroke-width="4"/>
  <ellipse cx="530" cy="110" rx="38" ry="48" fill="#B0C4DE" opacity="0.6"/>
  <!-- Mirror dust/haze effect -->
  <ellipse cx="530" cy="110" rx="38" ry="48" fill="url(#dusty)" opacity="0.3"/>
  <defs>
    <radialGradient id="dusty">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4c4a8" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <!-- Mirror highlight -->
  <ellipse cx="518" cy="90" rx="12" ry="20" fill="white" opacity="0.3" transform="rotate(-15,518,90)"/>
  <!-- Chandelier -->
  <line x1="400" y1="0" x2="400" y2="15" stroke="#DAA520" stroke-width="2"/>
  <path d="M370,22 Q400,15 430,22 Q435,30 430,35 Q400,28 370,35 Q365,30 370,22" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <line x1="375" y1="35" x2="375" y2="45" stroke="#DAA520" stroke-width="1"/>
  <line x1="400" y1="32" x2="400" y2="42" stroke="#DAA520" stroke-width="1"/>
  <line x1="425" y1="35" x2="425" y2="45" stroke="#DAA520" stroke-width="1"/>
  <!-- Candle flames -->
  <ellipse cx="375" cy="43" rx="3" ry="5" fill="#FFA500"/>
  <ellipse cx="400" cy="40" rx="3" ry="5" fill="#FFA500"/>
  <ellipse cx="425" cy="43" rx="3" ry="5" fill="#FFA500"/>
</svg>