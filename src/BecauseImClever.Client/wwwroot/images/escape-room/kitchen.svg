<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <!-- Floor - checkerboard tile -->
  <rect x="0" y="250" width="800" height="100" fill="#e8dcc8"/>
  <g opacity="0.4">
    <rect x="0" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="100" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="200" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="300" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="400" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="500" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="600" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="700" y="250" width="50" height="50" fill="#d4c4a0"/>
    <rect x="50" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="150" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="250" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="350" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="450" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="550" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="650" y="300" width="50" height="50" fill="#d4c4a0"/>
    <rect x="750" y="300" width="50" height="50" fill="#d4c4a0"/>
  </g>
  <!-- Wall -->
  <rect x="0" y="0" width="800" height="250" fill="#fff8dc"/>
  <!-- Tile backsplash -->
  <rect x="250" y="120" width="300" height="130" fill="#e0d8c0" stroke="#c8b898" stroke-width="1"/>
  <g opacity="0.3">
    <rect x="250" y="120" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="310" y="120" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="370" y="120" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="430" y="120" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="490" y="120" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="280" y="146" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="340" y="146" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="400" y="146" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="460" y="146" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="250" y="172" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="310" y="172" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="370" y="172" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="430" y="172" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
    <rect x="490" y="172" width="60" height="26" fill="none" stroke="#b8a888" stroke-width="1"/>
  </g>
  <!-- Cast iron stove (center) -->
  <g transform="translate(330,130)">
    <!-- Stove body -->
    <rect x="0" y="40" width="140" height="80" rx="5" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Stove top -->
    <rect x="-5" y="35" width="150" height="10" rx="3" fill="#333" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Burners -->
    <circle cx="35" cy="40" r="15" fill="#444" stroke="#555" stroke-width="2"/>
    <circle cx="35" cy="40" r="8" fill="#555"/>
    <circle cx="105" cy="40" r="15" fill="#444" stroke="#555" stroke-width="2"/>
    <circle cx="105" cy="40" r="8" fill="#555"/>
    <!-- Oven door -->
    <rect x="15" y="55" width="110" height="55" rx="3" fill="#333" stroke="#555" stroke-width="2"/>
    <rect x="25" y="62" width="90" height="18" rx="2" fill="#1a1a1a"/>
    <!-- Oven window (warm glow) -->
    <rect x="28" y="65" width="84" height="12" rx="1" fill="#FF6600" opacity="0.3"/>
    <!-- Handle -->
    <rect x="55" y="88" width="30" height="5" rx="2" fill="#888"/>
    <!-- Temperature dial -->
    <circle cx="35" cy="100" r="6" fill="#555" stroke="#777" stroke-width="1"/>
    <line x1="35" y1="95" x2="35" y2="98" stroke="#FFA500" stroke-width="1.5"/>
    <circle cx="105" cy="100" r="6" fill="#555" stroke="#777" stroke-width="1"/>
    <!-- Stove legs -->
    <rect x="10" y="120" width="12" height="10" rx="2" fill="#2a2a2a"/>
    <rect x="118" y="120" width="12" height="10" rx="2" fill="#2a2a2a"/>
    <!-- Steam from pot -->
    <ellipse cx="35" cy="28" rx="4" ry="6" fill="#ccc" opacity="0.3"/>
    <ellipse cx="42" cy="22" rx="3" ry="5" fill="#ccc" opacity="0.2"/>
    <!-- Pot -->
    <rect x="20" y="30" width="30" height="12" rx="2" fill="#666" stroke="#555" stroke-width="1"/>
  </g>
  <!-- Recipe board (left wall) -->
  <g transform="translate(30,25)">
    <rect x="0" y="0" width="160" height="120" rx="3" fill="#DEB887" stroke="#8B6914" stroke-width="3"/>
    <!-- Cork board texture -->
    <rect x="8" y="8" width="144" height="104" fill="#D2B48C"/>
    <!-- Pinned recipe cards -->
    <rect x="15" y="15" width="55" height="40" fill="#FFFFF0" transform="rotate(-3,42,35)"/>
    <circle cx="42" cy="15" r="3" fill="#FF0000"/>
    <g opacity="0.4">
      <line x1="20" y1="25" x2="60" y2="25" stroke="#333" stroke-width="0.8"/>
      <line x1="20" y1="30" x2="55" y2="30" stroke="#333" stroke-width="0.8"/>
      <line x1="20" y1="35" x2="58" y2="35" stroke="#333" stroke-width="0.8"/>
      <line x1="20" y1="40" x2="50" y2="40" stroke="#333" stroke-width="0.8"/>
      <line x1="20" y1="45" x2="52" y2="45" stroke="#333" stroke-width="0.8"/>
    </g>
    <rect x="80" y="20" width="60" height="45" fill="#FFF8DC" transform="rotate(2,110,42)"/>
    <circle cx="110" cy="20" r="3" fill="#0000FF"/>
    <g opacity="0.4">
      <line x1="85" y1="30" x2="130" y2="30" stroke="#333" stroke-width="0.8"/>
      <line x1="85" y1="35" x2="125" y2="35" stroke="#333" stroke-width="0.8"/>
      <line x1="85" y1="40" x2="128" y2="40" stroke="#333" stroke-width="0.8"/>
      <line x1="85" y1="45" x2="120" y2="45" stroke="#333" stroke-width="0.8"/>
      <line x1="85" y1="50" x2="126" y2="50" stroke="#333" stroke-width="0.8"/>
      <line x1="85" y1="55" x2="115" y2="55" stroke="#333" stroke-width="0.8"/>
    </g>
    <rect x="20" y="65" width="50" height="38" fill="#F0FFF0" transform="rotate(1,45,84)"/>
    <circle cx="45" cy="65" r="3" fill="#FFD700"/>
    <g opacity="0.4">
      <line x1="25" y1="73" x2="60" y2="73" stroke="#333" stroke-width="0.8"/>
      <line x1="25" y1="78" x2="55" y2="78" stroke="#333" stroke-width="0.8"/>
      <line x1="25" y1="83" x2="58" y2="83" stroke="#333" stroke-width="0.8"/>
      <line x1="25" y1="88" x2="52" y2="88" stroke="#333" stroke-width="0.8"/>
    </g>
  </g>
  <!-- Pantry shelf (right wall) -->
  <g transform="translate(600,30)">
    <!-- Shelf frame -->
    <rect x="0" y="0" width="170" height="220" rx="2" fill="#DEB887" stroke="#8B6914" stroke-width="3"/>
    <!-- Shelves -->
    <rect x="5" y="50" width="160" height="5" fill="#8B6914"/>
    <rect x="5" y="110" width="160" height="5" fill="#8B6914"/>
    <rect x="5" y="170" width="160" height="5" fill="#8B6914"/>
    <!-- Shelf 1: jars -->
    <rect x="15" y="20" width="22" height="28" rx="3" fill="#87CEEB" opacity="0.6" stroke="#4682B4" stroke-width="1"/>
    <rect x="12" y="18" width="28" height="5" rx="2" fill="#4682B4"/>
    <rect x="50" y="15" width="25" height="33" rx="3" fill="#90EE90" opacity="0.5" stroke="#228B22" stroke-width="1"/>
    <rect x="47" y="13" width="31" height="5" rx="2" fill="#228B22"/>
    <rect x="90" y="22" width="20" height="26" rx="10" fill="#FFD700" opacity="0.5" stroke="#DAA520" stroke-width="1"/>
    <rect x="87" y="20" width="26" height="5" rx="2" fill="#DAA520"/>
    <rect x="125" y="18" width="24" height="30" rx="3" fill="#DDA0DD" opacity="0.5" stroke="#BA55D3" stroke-width="1"/>
    <rect x="122" y="16" width="30" height="5" rx="2" fill="#BA55D3"/>
    <!-- Shelf 2: cans and boxes -->
    <rect x="15" y="60" width="30" height="45" rx="2" fill="#FF6347" stroke="#CD5C5C" stroke-width="1"/>
    <rect x="20" y="70" width="20" height="12" fill="#FFFFF0" opacity="0.5"/>
    <rect x="55" y="70" width="25" height="35" rx="2" fill="#DEB887" stroke="#D2B48C" stroke-width="1"/>
    <rect x="90" y="65" width="28" height="40" rx="2" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="95" y="75" width="18" height="10" fill="#FFFFF0" opacity="0.5"/>
    <rect x="130" y="72" width="22" height="33" rx="2" fill="#98FB98" stroke="#228B22" stroke-width="1"/>
    <!-- Shelf 3: bottles and misc -->
    <rect x="20" y="125" width="14" height="40" rx="4" fill="#228B22" opacity="0.6" stroke="#006400" stroke-width="1"/>
    <rect x="45" y="130" width="14" height="35" rx="4" fill="#8B4513" opacity="0.7" stroke="#654321" stroke-width="1"/>
    <rect x="70" y="120" width="30" height="45" rx="2" fill="#FFDAB9" stroke="#CD853F" stroke-width="1"/>
    <rect x="75" y="128" width="20" height="15" fill="#FFFFF0" opacity="0.5"/>
    <rect x="115" y="128" width="20" height="37" rx="3" fill="#FFD700" opacity="0.5" stroke="#DAA520" stroke-width="1"/>
    <rect x="145" y="135" width="16" height="30" rx="2" fill="#DDA0DD" opacity="0.6" stroke="#BA55D3" stroke-width="1"/>
  </g>
  <!-- Hanging pots rack -->
  <g transform="translate(280,5)">
    <line x1="0" y1="0" x2="0" y2="15" stroke="#555" stroke-width="2"/>
    <line x1="240" y1="0" x2="240" y2="15" stroke="#555" stroke-width="2"/>
    <rect x="0" y="15" width="240" height="4" rx="1" fill="#666"/>
    <!-- Hanging hooks and pots -->
    <line x1="30" y1="19" x2="30" y2="35" stroke="#888" stroke-width="1.5"/>
    <path d="M15,40 Q30,55 45,40" fill="none" stroke="#444" stroke-width="3"/>
    <line x1="80" y1="19" x2="80" y2="30" stroke="#888" stroke-width="1.5"/>
    <ellipse cx="80" cy="42" rx="18" ry="12" fill="none" stroke="#B87333" stroke-width="3"/>
    <line x1="160" y1="19" x2="160" y2="33" stroke="#888" stroke-width="1.5"/>
    <path d="M145,38 Q160,52 175,38" fill="none" stroke="#555" stroke-width="3"/>
    <line x1="210" y1="19" x2="210" y2="28" stroke="#888" stroke-width="1.5"/>
    <ellipse cx="210" cy="40" rx="15" ry="12" fill="none" stroke="#CD7F32" stroke-width="3"/>
  </g>
  <!-- Window above stove area -->
  <g transform="translate(350,10)">
    <rect x="0" y="0" width="100" height="80" fill="#87CEEB" stroke="#DEB887" stroke-width="4"/>
    <line x1="50" y1="0" x2="50" y2="80" stroke="#DEB887" stroke-width="3"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#DEB887" stroke-width="3"/>
    <!-- Curtains -->
    <path d="M-5,0 Q10,20 -5,40 Q10,60 -5,80" fill="#FFE4B5" opacity="0.7" stroke="#DEB887" stroke-width="1"/>
    <path d="M105,0 Q90,20 105,40 Q90,60 105,80" fill="#FFE4B5" opacity="0.7" stroke="#DEB887" stroke-width="1"/>
  </g>
</svg>